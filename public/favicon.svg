<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)"/>
  
  <!-- 内部装饰圆环 -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- P 字母 - 使用 Prompt 的首字母 -->
  <text x="50" y="68" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">P</text>
  
  <!-- 小星星装饰 -->
  <path d="M72 28 L74 33 L79 33 L75 36 L77 41 L72 38 L67 41 L69 36 L65 33 L70 33 Z" fill="#06B6D4"/>
  
  <!-- 光点装饰 -->
  <circle cx="25" cy="35" r="3" fill="rgba(255,255,255,0.6)"/>
  <circle cx="75" cy="65" r="2" fill="rgba(255,255,255,0.4)"/>
</svg>